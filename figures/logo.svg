<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005a9c"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Central orchestrator node -->
  <circle cx="60" cy="38" r="12" fill="white" opacity="0.95"/>
  <text x="60" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#005a9c">O</text>
  <!-- Worker nodes -->
  <circle cx="30" cy="85" r="9" fill="white" opacity="0.8"/>
  <text x="30" y="89" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#005a9c">W</text>
  <circle cx="60" cy="92" r="9" fill="white" opacity="0.8"/>
  <text x="60" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#005a9c">W</text>
  <circle cx="90" cy="85" r="9" fill="white" opacity="0.8"/>
  <text x="90" y="89" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#005a9c">W</text>
  <!-- Connection lines -->
  <line x1="52" y1="48" x2="34" y2="77" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="50" x2="60" y2="83" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="68" y1="48" x2="86" y2="77" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Workboard icon (small rectangle between workers) -->
  <rect x="42" y="68" width="36" height="12" rx="3" fill="white" opacity="0.35"/>
  <line x1="47" y1="72" x2="73" y2="72" stroke="#005a9c" stroke-width="1" opacity="0.5"/>
  <line x1="47" y1="76" x2="65" y2="76" stroke="#005a9c" stroke-width="1" opacity="0.5"/>
</svg>
